<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Terminal - Cafe & European Kitchen</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Pinyon+Script&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .background {
            position: absolute;
            inset: 0;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.3;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            /* background: url('Terminal_logo.png') center/contain no-repeat; */
            opacity: 0.9;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #e8d2a8 50%, #cfa93f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            font-style: italic;
            color: #cfa93f;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }

        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #cfa93f, transparent);
            margin: 0 auto 50px;
            box-shadow: 0 0 20px rgba(207, 169, 63, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
        }

        .card {
            position: relative;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card.cinematic::before {
            background-image: url('cinematic/image.png');
        }

        .card.classic::before {
            background-image: url('classic/image.png');
        }

        .card.digital::before {
            background-image: url('digital-menu/image.png');
        }

        .card.standalone::before {
            background-image: url('standalone/image.png');
            background-size: 120%;
        }

        .card:hover::before {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
            transition: all 0.4s ease;
        }

        .card:hover .card-overlay {
            background: linear-gradient(135deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
        }

        .card-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .card-content {
            transform: translateY(-10px);
        }

        .card-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 0.85rem;
            color: #e8d2a8;
            opacity: 0;
            transition: opacity 0.4s ease 0.1s;
            font-weight: 300;
        }

        .card:hover .card-description {
            opacity: 1;
        }

        .card-arrow {
            font-size: 1.2rem;
            color: #cfa93f;
            opacity: 0;
            transition: all 0.4s ease 0.2s;
            margin-top: 15px;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
        }

        .footer-divider {
            width: 40px;
            height: 1px;
            background: #666;
            margin: 0 auto 15px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 0 15px;
            }

            .header {
                margin-bottom: 40px;
            }

            .subtitle {
                margin-bottom: 30px;
            }

            .card {
                aspect-ratio: 4 / 3;
            }
        }

        /* Scroll hint animation */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(207, 169, 63, 0.3); }
            50% { box-shadow: 0 0 40px rgba(207, 169, 63, 0.6); }
        }

        .divider {
            animation: pulse-glow 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="background"></div>
        
        <div class="content">
            <div class="header">
                <div class="logo"></div>
                <h1 class="title">THE TERMINAL</h1>
                <p class="subtitle">Cafe & European Kitchen</p>
                <div class="divider"></div>
            </div>

            <div class="grid">
                <!-- Cinematic Card -->
                <a href="cinematic/index.html" class="card cinematic">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Cinematic</div>
                        <div class="card-description">Immersive & Elegant</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Classic Card -->
                <a href="classic/index.html" class="card classic">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Classic</div>
                        <div class="card-description">Timeless & Sophisticated</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Digital Menu Card -->
                <a href="digital-menu/index.html" class="card digital">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Digital Menu</div>
                        <div class="card-description">Modern & Interactive</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Standalone Card -->
                <a href="standalone/index.html" class="card standalone">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Standalone</div>
                        <div class="card-description">Minimalist & Clean</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="footer">
            <div class="footer-divider"></div>
            <p>Established 2024 • Luxury European Cuisine</p>
        </div>
    </div>

    <script>
        // Smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Add subtle parallax effect to background on mouse move
        const background = document.querySelector('.background');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.clientX * 2) / 100;
            const y = (window.innerHeight - e.clientY * 2) / 100;
            background.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Add ripple effect on card click
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function(e) {
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    width: 20px;
                    height: 20px;
                    background: rgba(207, 169, 63, 0.6);
                    border-radius: 50%;
                    pointer-events: none;
                    animation: rippleEffect 0.6s ease-out;
                `;
                
                const rect = this.getBoundingClientRect();
                ripple.style.left = (e.clientX - rect.left) + 'px';
                ripple.style.top = (e.clientY - rect.top) + 'px';
                
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Define ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                100% {
                    transform: scale(30);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
