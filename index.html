<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Terminal - Cafe & European Kitchen</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Pinyon+Script&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .background {
            position: absolute;
            inset: 0;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.3;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: clamp(30px, 10vw, 60px);
            width: 100%;
        }

        .logo {
            width: clamp(50px, 15vw, 100px);
            height: clamp(50px, 15vw, 100px);
            margin: 0 auto clamp(15px, 5vw, 30px);
            /* background: url('Terminal_logo.png') center/contain no-repeat; */
            opacity: 0.9;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.5rem, 7vw, 4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: clamp(1px, 2vw, 3px);
            margin-bottom: clamp(8px, 3vw, 15px);
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #e8d2a8 50%, #cfa93f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.75rem, 2.5vw, 1.3rem);
            font-style: italic;
            color: #cfa93f;
            letter-spacing: clamp(1px, 1.5vw, 2px);
            margin-bottom: clamp(25px, 8vw, 50px);
        }

        .divider {
            width: clamp(80px, 20vw, 150px);
            height: 2px;
            background: linear-gradient(90deg, transparent, #cfa93f, transparent);
            margin: 0 auto clamp(25px, 8vw, 50px);
            box-shadow: 0 0 20px rgba(207, 169, 63, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: clamp(20px, 5vw, 40px);
            max-width: 1200px;
            width: 100%;
            padding: 0 clamp(10px, 3vw, 40px);
        }

        .card {
            position: relative;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 180px;
            touch-action: manipulation;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card.cinematic::before {
            background-image: url('cinematic/image.png');
        }

        .card.classic::before {
            background-image: url('classic/image.png');
        }

        .card.digital::before {
            background-image: url('digital-menu/image.png');
        }

        .card.standalone::before {
            background-image: url('standalone/image.png');
            background-size: 120%;
        }

        .card:hover::before {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
            transition: all 0.4s ease;
        }

        .card:hover .card-overlay {
            background: linear-gradient(135deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
        }

        .card-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: clamp(15px, 4vw, 30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .card-content {
            transform: translateY(-10px);
        }

        .card:active .card-content {
            transform: translateY(-5px);
        }

        .card-label {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: clamp(1px, 1.5vw, 2px);
            margin-bottom: clamp(5px, 2vw, 10px);
        }

        .card-description {
            font-size: clamp(0.65rem, 2.5vw, 0.85rem);
            color: #e8d2a8;
            opacity: 0;
            transition: opacity 0.4s ease 0.1s;
            font-weight: 300;
        }

        .card:hover .card-description {
            opacity: 1;
        }

        .card:active .card-description {
            opacity: 1;
        }

        .card-arrow {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #cfa93f;
            opacity: 0;
            transition: all 0.4s ease 0.2s;
            margin-top: clamp(8px, 2vw, 15px);
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        .card:active .card-arrow {
            opacity: 1;
            transform: translateX(3px);
        }

        .footer {
            position: absolute;
            bottom: clamp(15px, 4vw, 30px);
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-size: clamp(0.65rem, 2vw, 0.85rem);
            color: #888;
            letter-spacing: clamp(0.5px, 1vw, 1px);
            padding: 0 20px;
        }

        .footer-divider {
            width: 30px;
            height: 1px;
            background: #666;
            margin: 0 auto clamp(8px, 3vw, 15px);
        }

        @media (max-width: 1024px) {
            .container {
                overflow: auto;
            }

            .content {
                min-height: 100vh;
                justify-content: flex-start;
                padding-top: clamp(30px, 10vw, 60px);
            }

            .header {
                margin-bottom: clamp(30px, 8vw, 50px);
            }

            .footer {
                position: relative;
                bottom: auto;
                margin-top: clamp(30px, 8vw, 50px);
                padding: clamp(20px, 5vw, 40px);
            }
        }

        @media (max-width: 768px) {
            html, body {
                overflow: auto;
            }

            .container {
                /* height: auto; */
                min-height: 100vh;
                overflow: visible;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: clamp(15px, 4vw, 25px);
                padding: 0 clamp(12px, 3vw, 20px);
                margin-bottom: clamp(20px, 5vw, 40px);
            }

            .card {
                aspect-ratio: 1 / 1;
                min-height: 250px;
            }

            .header {
                padding: 0 clamp(10px, 3vw, 20px);
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 15px 10px;
                padding-bottom: clamp(80px, 20vw, 120px);
            }

            .header {
                margin-bottom: clamp(20px, 6vw, 35px);
            }

            .grid {
                grid-template-columns: 1fr;
                gap: clamp(12px, 3vw, 20px);
                padding: 0 10px;
            }

            .card {
                aspect-ratio: 4 / 5;
                min-height: 220px;
            }

            .card-label {
                font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            }

            .card-description {
                font-size: clamp(0.6rem, 2vw, 0.75rem);
            }

            .title {
                font-size: clamp(1.2rem, 6vw, 2rem);
                letter-spacing: clamp(0.5px, 1.5vw, 2px);
            }

            .subtitle {
                font-size: clamp(0.65rem, 2vw, 0.95rem);
            }

            .footer {
                margin-top: clamp(20px, 5vw, 35px);
                font-size: clamp(0.6rem, 1.8vw, 0.75rem);
            }
        }

        /* Tablet landscape mode */
        @media (max-width: 1024px) and (orientation: landscape) {
            .content {
                justify-content: center;
                min-height: auto;
                padding: clamp(15px, 5vw, 30px);
            }

            .header {
                margin-bottom: clamp(15px, 5vw, 30px);
            }

            .footer {
                position: absolute;
                bottom: clamp(10px, 3vw, 20px);
            }

            .grid {
                gap: clamp(15px, 4vw, 30px);
            }

            .card {
                min-height: 160px;
                aspect-ratio: 16 / 9;
            }
        }

        /* Mobile landscape mode */
        @media (max-width: 768px) and (orientation: landscape) {
            .container {
                height: auto;
            }

            .content {
                min-height: auto;
                padding: clamp(10px, 3vw, 20px);
                justify-content: center;
            }

            .header {
                margin-bottom: clamp(10px, 3vw, 20px);
            }

            .grid {
                margin-bottom: 20px;
            }

            .card {
                aspect-ratio: 16 / 9;
                min-height: 140px;
            }

            .footer {
                position: relative;
                margin-top: 15px;
                padding: 10px;
                font-size: clamp(0.6rem, 1.5vw, 0.7rem);
            }
        }

        /* High DPI screens */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .card:active::before {
                box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .card {
                transition: all 0.3s ease;
            }

            .card:active {
                transform: scale(0.98);
            }

            .card:active .card-overlay {
                background: linear-gradient(135deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            }

            .card-description {
                opacity: 1;
            }

            .card-arrow {
                opacity: 1;
            }
        }

        /* Scroll hint animation */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(207, 169, 63, 0.3); }
            50% { box-shadow: 0 0 40px rgba(207, 169, 63, 0.6); }
        }

        .divider {
            animation: pulse-glow 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="background"></div>
        
        <div class="content">
            <div class="header">
                <div class="logo"></div>
                <h1 class="title">THE TERMINAL</h1>
                <p class="subtitle">Cafe & European Kitchen</p>
                <div class="divider"></div>
            </div>

            <div class="grid">
                <!-- Cinematic Card -->
                <a href="cinematic/index.html" class="card cinematic">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Cinematic</div>
                        <div class="card-description">Immersive & Elegant</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Classic Card -->
                <a href="classic/index.html" class="card classic">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Classic</div>
                        <div class="card-description">Timeless & Sophisticated</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Digital Menu Card -->
                <a href="digital-menu/index.html" class="card digital">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Digital Menu</div>
                        <div class="card-description">Modern & Interactive</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>

                <!-- Standalone Card -->
                <a href="standalone/index.html" class="card standalone">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-label">Standalone</div>
                        <div class="card-description">Minimalist & Clean</div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="footer">
            <div class="footer-divider"></div>
            <p>Established 2024 • Luxury European Cuisine</p>
        </div>
    </div>

    <script>
        // Smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Add subtle parallax effect to background on mouse move (desktop only)
        const background = document.querySelector('.background');
        const isTouchDevice = () => {
            return (('ontouchstart' in window) ||
                    (navigator.maxTouchPoints > 0) ||
                    (navigator.msMaxTouchPoints > 0));
        };

        if (!isTouchDevice()) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth - e.clientX * 2) / 100;
                const y = (window.innerHeight - e.clientY * 2) / 100;
                background.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        // Add ripple effect on card click (with touch support)
        document.querySelectorAll('.card').forEach(card => {
            const createRipple = (e) => {
                // Prevent ripple on link navigation
                if (e.type === 'click' && (e.ctrlKey || e.metaKey || e.button === 1)) {
                    return;
                }

                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    width: 20px;
                    height: 20px;
                    background: rgba(207, 169, 63, 0.6);
                    border-radius: 50%;
                    pointer-events: none;
                    animation: rippleEffect 0.6s ease-out;
                    z-index: 4;
                `;
                
                const rect = card.getBoundingClientRect();
                let x, y;

                if (e.type.includes('touch')) {
                    const touch = e.touches[0] || e.changedTouches[0];
                    x = touch.clientX - rect.left;
                    y = touch.clientY - rect.top;
                } else {
                    x = e.clientX - rect.left;
                    y = e.clientY - rect.top;
                }

                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            };

            card.addEventListener('click', createRipple);
            card.addEventListener('touchend', createRipple);
        });

        // Define ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                100% {
                    transform: scale(30);
                    opacity: 0;
                }
            }

            /* Prevent text selection on touch */
            @media (hover: none) and (pointer: coarse) {
                .card-label,
                .card-description,
                .card-arrow {
                    user-select: none;
                    -webkit-user-select: none;
                    -webkit-touch-callout: none;
                }
            }
        `;
        document.head.appendChild(style);

        // Handle viewport resizing for better responsive experience
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            document.body.style.opacity = '0.95';
            resizeTimer = setTimeout(() => {
                document.body.style.opacity = '1';
            }, 250);
        });

        // Prevent zooming on double tap (except on input fields)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            }
            lastTouchEnd = now;
        }, false);

        // Add viewport meta tag for better mobile experience (if not already present)
        if (!document.querySelector('meta[name="viewport"]')) {
            const viewport = document.createElement('meta');
            viewport.name = 'viewport';
            viewport.content = 'width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes';
            document.head.appendChild(viewport);
        }

        // Adjust for safe areas (notch support)
        if (typeof CSS !== 'undefined' && CSS.supports('padding', 'max(0px)')) {
            document.documentElement.style.setProperty('--safe-area-inset-top', 'env(safe-area-inset-top)');
            document.documentElement.style.setProperty('--safe-area-inset-bottom', 'env(safe-area-inset-bottom)');
        }
    </script>
</body>
</html>
