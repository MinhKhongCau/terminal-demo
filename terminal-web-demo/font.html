<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      /* nền ngoài */
      background: #E0C9A6;

      font-family: "Oswald", sans-serif;
    }

    /* bảng gỗ */
    .signboard {
      position: relative;

      padding: 50px 70px 40px;

      border-radius: 10px;

      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 35%),
        linear-gradient(
          180deg,
          #5a3427 0%,
          #4a2d22 45%,
          #3b241b 100%
        );

      box-shadow:
        inset 0 0 25px rgba(0,0,0,.35),
        0 10px 30px rgba(0,0,0,.45);

      overflow: hidden;
    }

    /* texture gỗ nhẹ */
    .signboard::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.02) 0px,
          rgba(255,255,255,.02) 2px,
          transparent 2px,
          transparent 6px
        );

      opacity: .25;
      pointer-events: none;
    }

    .title {
      position: relative;

      font-size: 120px;
      font-weight: 700;
      line-height: 1;

      letter-spacing: 6px;
      text-align: center;

      /* vàng sáng giữa -> tối 2 bên */
      background: linear-gradient(
        0deg,
        #b97716 0%,
        #f4c14f 20%,
        #fff1b3 50%,
        #f4c14f 80%,
        #b97716 100%
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 10px rgba(255, 215, 120, 0.15),
        0 3px 10px rgba(0,0,0,.25);
    }

    .divider {
      width: 100%;
      height: 4px;

      margin: 20px 0 24px;

      background: linear-gradient(
        0deg,
        #c88d2b 0%,
        #ffe9a3 50%,
        #c88d2b 100%
      );

      box-shadow:
        0 0 8px rgba(255,220,120,.25);
    }

    .subtitle {
      position: relative;

      text-align: center;

      font-size: 52px;
      font-weight: 500;

      letter-spacing: 3px;

      background: linear-gradient(
        0deg,
        #b97716 0%,
        #f4c14f 20%,
        #fff1b3 50%,
        #f4c14f 80%,
        #b97716 100%
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 6px rgba(255, 220, 120, 0.15),
        0 2px 6px rgba(0,0,0,.25);
    }

    @media (max-width: 900px) {
      .signboard {
        width: 92%;
        padding: 30px;
      }

      .title {
        font-size: 72px;
      }

      .subtitle {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div class="signboard">

    <div class="title">
      THE TERMINAL
    </div>

    <div class="divider"></div>

    <div class="subtitle">
      CAFE & EUROPEAN KITCHEN
    </div>

  </div>

</body>
</html>
